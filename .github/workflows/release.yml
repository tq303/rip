name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BIN_NAME: rip

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: amd64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build -o ${{ env.BIN_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${EXT} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BIN_NAME }}-${{ matrix.os }}-${{ matrix.arch }}*
